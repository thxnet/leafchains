name: Rust

on:
  push:
    branches:
      - main
      - develop
      - ci/*
      - feat/*
      - feature/*
      - hotfix/*
      - release/*

  pull_request:

env:
  NIX_CONFIG: "experimental-features = nix-command flakes"
  CARGO_TERM_COLOR: always
  RUSTC_WRAPPER: sccache
  SCCACHE_BUCKET: sccache
  SCCACHE_ENDPOINT: ${{ secrets.SCCACHE_ENDPOINT }}
  SCCACHE_S3_USE_SSL: "true"
  SCCACHE_REGION: auto
  AWS_ACCESS_KEY_ID: ${{ secrets.MINIO_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.MINIO_SECRET_ACCESS_KEY }}

concurrency:
  group: rust-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rustfmt:
    name: Check Rust format
    runs-on: hetzner-thxnet
    steps:
      - uses: actions/checkout@v3

      - name: Install system dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y xz-utils

      - name: Install Nix
        uses: cachix/install-nix-action@v27

      - name: Show rustfmt version
        run: |
          nix develop --command cargo fmt --version

      - name: Run cargo fmt
        run: |
          nix develop --command cargo fmt --all --verbose --check

  # TODO:enable `cargo-udeps`
  # udeps:
  #   name: Check unused dependencies
  #   runs-on: ubuntu-latest
  #   needs:
  #     - rustfmt
  #   steps:
  #     - uses: actions/checkout@v3
  #       with:
  #         submodules: "true"
  #
  #     - name: Install Nix
  #       uses: cachix/install-nix-action@v22
  #
  #     - name: Pre Cache
  #       run: |
  #         rm -rf ~/.cargo/registry/index/ ~/.cargo/registry/cache/ ~/.cargo/git/db/
  #
  #     - name: Cache
  #       uses: actions/cache@v3
  #       with:
  #         path: |
  #           ~/.cargo/registry/index/
  #           ~/.cargo/registry/cache/
  #           ~/.cargo/git/db/
  #         key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
  #
  #     - name: Show cargo-udeps version
  #       run: |
  #         nix develop --command cargo udeps --version
  #
  #     - name: Run cargo-udeps
  #       run: |
  #         nix develop --command cargo udeps-all

  clippy:
    name: Clippy
    runs-on: hetzner-thxnet
    needs:
      - rustfmt
    steps:
      - uses: actions/checkout@v3

      - name: Install system dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y xz-utils

      - name: Install Nix
        uses: cachix/install-nix-action@v27

      - name: Pre Cache
        run: |
          rm -rf ~/.cargo/registry/index/ ~/.cargo/registry/cache/ ~/.cargo/git/db/

      - name: Cache
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Show sccache version
        run: |
          nix develop --command sccache --version

      - name: Show cargo clippy version
        run: |
          nix develop --command cargo clippy --version

      - name: Run cargo clippy
        run: |
          nix develop --command cargo clippy-all

      - name: Show sccache stats
        run: |
          nix develop --command sccache --show-stats

  test:
    name: Test
    runs-on: hetzner-thxnet
    needs:
      - clippy
      # - udeps
    env:
      NEXTEST_RETRIES: 5
    strategy:
      fail-fast: false
      matrix:
        toolchain:
          # TODO: make `stable` available
          # - stable
          - nightly
        mode:
          - release
    steps:
      - uses: actions/checkout@v3

      - name: Install system dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y xz-utils

      - name: Install Nix
        uses: cachix/install-nix-action@v27

      - name: Pre Cache
        run: |
          rm -rf ~/.cargo/registry/index/ ~/.cargo/registry/cache/ ~/.cargo/git/db/

      - name: Cache
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Show sccache version
        run: |
          nix develop --command sccache --version

      - name: Show cargo-nextest version
        run: |
          nix develop --command cargo nextest --version

      - name: Test with cargo-nextest
        run: |
          nix develop --command cargo nextest-all ${{ matrix.mode == 'release' && '--release' || '' }}

      - name: Show sccache stats
        run: |
          nix develop --command sccache --show-stats
